<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络接口信息</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f2f5;
            color: #333;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 24px;
            color: #1a1a1a;
        }
        .toolbar {
            text-align: center;
            margin-bottom: 20px;
        }
        .toolbar button {
            padding: 8px 24px;
            font-size: 14px;
            border: none;
            border-radius: 6px;
            background: #1677ff;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s;
        }
        .toolbar button:hover { background: #0958d9; }
        .toolbar button:disabled { background: #aaa; cursor: not-allowed; }
        .status { text-align: center; margin-bottom: 16px; color: #888; font-size: 14px; }
        .status.error { color: #ff4d4f; }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 16px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 20px;
            transition: box-shadow 0.2s;
        }
        .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
        .card h2 {
            font-size: 18px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #1677ff;
            color: #1677ff;
        }
        .card table { width: 100%; border-collapse: collapse; }
        .card td {
            padding: 6px 4px;
            font-size: 13px;
            border-bottom: 1px solid #f0f0f0;
            word-break: break-all;
        }
        .card td:first-child {
            font-weight: 600;
            color: #555;
            width: 120px;
            white-space: nowrap;
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-up { background: #e6fffb; color: #08979c; }
        .badge-down { background: #fff1f0; color: #cf1322; }
        .badge-ipv4 { background: #e6f7ff; color: #1677ff; }
        .badge-ipv6 { background: #f9f0ff; color: #722ed1; }
        .empty { text-align: center; padding: 60px; color: #999; font-size: 16px; }
        .loader {
            display: inline-block;
            width: 20px; height: 20px;
            border: 3px solid #e0e0e0;
            border-top-color: #1677ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>&#127760; 网络接口信息</h1>
    <div class="toolbar">
        <button id="refreshBtn" onclick="loadInterfaces()">&#128260; 刷新数据</button>
    </div>
    <div id="status" class="status"></div>
    <div id="cards" class="cards"></div>

    <script>
        function escapeHtml(str) {
            if (typeof str !== 'string') return str;
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        function formatAddress(obj) {
            if (!obj || typeof obj !== 'object') return null;
            var addr = obj.address || '';
            var mask = obj.mask;
            if (addr && mask !== undefined) return addr + '/' + mask;
            return addr || null;
        }

        function formatRoute(route) {
            if (!route || typeof route !== 'object') return null;
            var parts = [];
            if (route.target) parts.push('目标: ' + route.target);
            if (route.nexthop) parts.push('下一跳: ' + route.nexthop);
            if (route.source && route.source !== '::/0') parts.push('源: ' + route.source);
            if (route.metric !== undefined) parts.push('度量: ' + route.metric);
            return parts.join(' · ') || null;
        }

        function renderValue(val) {
            if (val === null || val === undefined) return '<span style="color:#bbb">-</span>';
            if (typeof val === 'boolean') return val ? '✓ 是' : '✗ 否';
            if (Array.isArray(val)) {
                if (val.length === 0) return '<span style="color:#bbb">-</span>';
                return val.map(function(v) {
                    if (typeof v === 'object') {
                        // 尝试作为地址格式化
                        var fmt = formatAddress(v);
                        if (fmt) return '<span class="badge badge-ipv4">' + escapeHtml(fmt) + '</span>';
                        // 尝试作为路由格式化
                        var r = formatRoute(v);
                        if (r) return '<span class="badge badge-ipv6">' + escapeHtml(r) + '</span>';
                        return '<code>' + escapeHtml(JSON.stringify(v)) + '</code>';
                    }
                    return '<span class="badge badge-ipv4">' + escapeHtml(String(v)) + '</span>';
                }).join('<br>');
            }
            if (typeof val === 'object') {
                var fmt = formatAddress(val);
                if (fmt) return escapeHtml(fmt);
                var r = formatRoute(val);
                if (r) return escapeHtml(r);
                return '<code>' + escapeHtml(JSON.stringify(val)) + '</code>';
            }
            return escapeHtml(String(val));
        }

        function setStatus(text, isError) {
            var el = document.getElementById('status');
            el.textContent = text;
            el.className = 'status' + (isError ? ' error' : '');
        }

        function renderCards(interfaces) {
            var container = document.getElementById('cards');
            if (!interfaces || interfaces.length === 0) {
                container.innerHTML = '<div class="empty">未发现网络接口</div>';
                return;
            }

            // 排序：wan 系列排最前，其余按名称排序
            interfaces.sort(function(a, b) {
                var nameA = (a.interface || a.name || '').toLowerCase();
                var nameB = (b.interface || b.name || '').toLowerCase();
                var isWanA = nameA.indexOf('wan') === 0 ? 0 : 1;
                var isWanB = nameB.indexOf('wan') === 0 ? 0 : 1;
                if (isWanA !== isWanB) return isWanA - isWanB;
                return nameA.localeCompare(nameB);
            });

            var html = '';
            for (var i = 0; i < interfaces.length; i++) {
                var iface = interfaces[i];
                var name = iface.interface || iface.name || ('接口 #' + (i + 1));
                var up = iface.up;
                var ipv4 = iface['ipv4-address'] || [];
                var ipv6 = iface['ipv6-address'] || [];
                var dns = iface['dns-server'] || [];
                var proto = iface.proto || '-';
                var device = iface.l3_device || iface.device || '-';

                html += '<div class="card">';
                html += '<h2>' + escapeHtml(name);
                if (up === true) {
                    html += ' <span class="badge badge-up">在线</span>';
                } else if (up === false) {
                    html += ' <span class="badge badge-down">离线</span>';
                }
                html += '</h2>';
                html += '<table>';

                var rows = [
                    ['接口', name],
                    ['协议', proto],
                    ['设备', device],
                    ['状态', up === true ? '在线' : (up === false ? '离线' : '-')],
                    ['连接', iface.connected !== undefined ? iface.connected : '-'],
                    ['运行', iface.running !== undefined ? iface.running : '-'],
                    ['IPv4 地址', ipv4],
                    ['IPv6 地址', ipv6],
                    ['DNS 服务器', dns],
                    ['网关', iface.route || '-'],
                    ['上游接口', iface['upstream-device'] || '-']
                ];

                for (var j = 0; j < rows.length; j++) {
                    html += '<tr><td>' + escapeHtml(rows[j][0]) + '</td><td>' + renderValue(rows[j][1]) + '</td></tr>';
                }

                html += '</table></div>';
            }
            container.innerHTML = html;
        }

        function loadInterfaces() {
            var btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span>加载中...';
            setStatus('正在获取数据...', false);

            fetch('/api/network/interfaces')
                .then(function(res) { return res.json(); })
                .then(function(json) {
                    if (json.success && json.data) {
                        renderCards(json.data);
                        setStatus('共 ' + json.data.length + ' 个接口 · 更新于 ' + new Date().toLocaleTimeString(), false);
                    } else {
                        document.getElementById('cards').innerHTML = '<div class="empty">获取数据失败</div>';
                        setStatus('接口返回异常: ' + (json.error || '未知错误'), true);
                    }
                })
                .catch(function(err) {
                    document.getElementById('cards').innerHTML = '<div class="empty">请求失败</div>';
                    setStatus('请求失败: ' + err.message, true);
                })
                .finally(function() {
                    btn.disabled = false;
                    btn.innerHTML = '&#128260; 刷新数据';
                });
        }

        // 页面加载后自动获取数据
        loadInterfaces();
    </script>
</body>
</html>
